name: Build Arqitect Site

on:
  push:
    branches: [main]
    paths:
      - "nerves/**"
      - "adapters/**"
      - "connectors/**"
      - "mcp_tools/**"
      - "mcps/**"
      - "scripts/build_site.py"
      - "docs/css/**"
      - "docs/js/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PUBLIC }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Rebuild Arqitect site [skip ci]"
          git push
