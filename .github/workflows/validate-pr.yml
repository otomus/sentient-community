name: Validate PR

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Reject changes to auto-managed files
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          ERRORS=0

          if echo "$CHANGED" | grep -q '^manifest\.json$'; then
            echo "::error::manifest.json is auto-generated by CI. Remove it from your PR."
            ERRORS=1
          fi

          if echo "$CHANGED" | grep -q '^nerves/'; then
            echo "::error::nerves/ is managed by sentient-core. Community PRs cannot modify nerves."
            ERRORS=1
          fi

          if echo "$CHANGED" | grep -q '^adapters/'; then
            echo "::error::adapters/ is managed by sentient-core. Community PRs cannot modify adapters."
            ERRORS=1
          fi

          if echo "$CHANGED" | grep -q '^scripts/'; then
            echo "::error::scripts/ contains internal tooling. Community PRs cannot modify scripts."
            ERRORS=1
          fi

          if echo "$CHANGED" | grep -q '^schemas/'; then
            echo "::error::schemas/ are maintained by the core team. Community PRs cannot modify schemas."
            ERRORS=1
          fi

          if echo "$CHANGED" | grep -q '^\.github/'; then
            echo "::error::CI workflows are maintained by the core team. Community PRs cannot modify .github/."
            ERRORS=1
          fi

          if [ "$ERRORS" -ne 0 ]; then
            echo ""
            echo "Only connectors/, tools/, and mcps/ can be modified by community PRs."
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

      - name: Run schema validation
        run: python scripts/validate.py

      - name: Run secret scan
        run: python scripts/check_secrets.py nerves/ adapters/ connectors/ tools/ mcps/

