name: Validate PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema pytest

      - name: Reject changes to auto-managed files
        id: path-check
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          ERRORS=0
          REASONS=""

          # Helper: flag a protected-path violation.
          # Usage: check_path <grep_args> <message>
          check_path() {
            local grep_args="$1"
            local msg="$2"
            if echo "$CHANGED" | grep -q $grep_args; then
              echo "::error::$msg"
              REASONS="${REASONS}- ${msg}\n"
              ERRORS=1
            fi
          }

          check_path '^manifest\.json$' \
            "manifest.json is auto-generated by CI. Remove it from your PR."

          # adapters/{role}/{size_class}/ defaults are core-managed
          # adapters/{role}/{size_class}/{model_name}/ are community-contributed
          DEFAULT_ADAPTER_FILES=$(echo "$CHANGED" | grep '^adapters/' | grep -v '^adapters/[^/]*/[^/]*/[^/]*/' || true)
          if [ -n "$DEFAULT_ADAPTER_FILES" ]; then
            MSG="Default adapter files are managed by the core team. Community PRs can only add model-specific adapters under adapters/{role}/{size_class}/{model_name}/."
            echo "::error::$MSG"
            echo "  Protected files: $DEFAULT_ADAPTER_FILES"
            REASONS="${REASONS}- ${MSG}\n"
            ERRORS=1
          fi

          check_path '^scripts/' \
            "scripts/ contains internal tooling. Community PRs cannot modify scripts."

          check_path '^schemas/' \
            "schemas/ are maintained by the core team. Community PRs cannot modify schemas."

          check_path '^\.github/' \
            "CI workflows are maintained by the core team. Community PRs cannot modify .github/."

          check_path '^tests/' \
            "tests/ are maintained by the core team. Community PRs cannot modify tests."

          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "reasons<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REASONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$ERRORS" -ne 0 ]; then
            echo ""
            echo "Community PRs can modify: nerves/, adapters/{role}/{size}/{model}/, connectors/, mcp_tools/, mcps/"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

      - name: Comment failure reason on PR
        if: failure() && steps.path-check.outputs.errors != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const reasons = `${{ steps.path-check.outputs.reasons }}`;
            const body = `## Validation Failed\n\nThis PR modifies protected paths:\n\n${reasons}\nCommunity PRs can modify: \`nerves/\`, \`adapters/{role}/{size}/{model}/\`, \`connectors/\`, \`mcp_tools/\`, \`mcps/\`. Default adapter files are core-managed. See [CONTRIBUTING.md](CONTRIBUTING.md) for details.`;
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } catch (err) {
              console.error(`Failed to post validation comment: ${err.message}`);
            }

      - name: Run schema validation
        id: schema-check
        run: python scripts/validate.py --changed-only 2>&1 | tee /tmp/validate-output.txt

      - name: Comment schema errors on PR
        if: failure() && steps.schema-check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/validate-output.txt', 'utf8');
            // Match lines that start with whitespace followed by known validation
            // keywords: ERROR, UNSAFE, or common schema issues like "missing",
            // "invalid", "must", "lora_target". This filters noise from the full
            // validate.py output to show only actionable errors.
            const VALIDATION_ERROR_PATTERN = /^\s+(ERROR|UNSAFE|.*missing|.*invalid|.*must|.*lora_target)/i;
            const errors = output.split('\n').filter(l => l.match(VALIDATION_ERROR_PATTERN));
            const body = `## Schema Validation Failed\n\n\`\`\`\n${errors.join('\n')}\n\`\`\`\n\nPlease fix the issues above and push again. See [CONTRIBUTING.md](CONTRIBUTING.md) for details.`;
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } catch (err) {
              console.error(`Failed to post schema-error comment: ${err.message}`);
            }

      - name: Check score quality and regression
        id: score-check
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          REGRESSIONS=""
          LOW_QUALITY=""

          for ctx in $(echo "$CHANGED" | grep 'context\.json$'); do
            # Check both adapters/ and nerves/
            echo "$ctx" | grep -qE '^(adapters|nerves)/' || continue

            PR_SCORE=$(python3 -c "import sys,json; print(json.load(open('$ctx')).get('qualification_score', 0))" 2>/dev/null || echo "0")

            # Find the parent meta.json to get low_quality_threshold
            # For adapters/{role}/{size}/{model}/context.json -> adapters/{role}/{size}/meta.json
            # For nerves/{name}/context.json -> nerves/{name}/meta.json
            META_DIR=$(dirname "$ctx")
            if echo "$ctx" | grep -qE '^adapters/[^/]+/[^/]+/[^/]+/'; then
              # Model-specific adapter: go up to size-class default for thresholds
              META_DIR=$(echo "$ctx" | sed 's|/[^/]*/context\.json$||')
            fi
            META_PATH="$META_DIR/meta.json"

            if [ -f "$META_PATH" ]; then
              LOW_THRESH=$(python3 -c "import json; m=json.load(open('$META_PATH')); print(m.get('qualification',{}).get('low_quality_threshold', 0))" 2>/dev/null || echo "0")

              if python3 -c "exit(0 if float('$PR_SCORE') < float('$LOW_THRESH') else 1)"; then
                echo "::error::$ctx: score $PR_SCORE is below low_quality_threshold $LOW_THRESH"
                LOW_QUALITY="${LOW_QUALITY}| \`$ctx\` | $LOW_THRESH | $PR_SCORE |\n"
              fi
            fi

            # Check regression against main (only if file already exists)
            if git show origin/main:"$ctx" > /dev/null 2>&1; then
              MAIN_SCORE=$(git show origin/main:"$ctx" | python3 -c "import sys,json; print(json.load(sys.stdin).get('qualification_score', 0))" 2>/dev/null || echo "0")

              if python3 -c "exit(0 if float('$PR_SCORE') < float('$MAIN_SCORE') else 1)"; then
                echo "::error::$ctx: score regression $PR_SCORE < $MAIN_SCORE (main)"
                REGRESSIONS="${REGRESSIONS}| \`$ctx\` | $MAIN_SCORE | $PR_SCORE |\n"
              else
                echo "  $ctx: OK ($PR_SCORE >= $MAIN_SCORE)"
              fi
            else
              echo "  $ctx: new file, no baseline on main"
            fi
          done

          echo "regressions<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REGRESSIONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "low_quality<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$LOW_QUALITY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ -n "$LOW_QUALITY" ] || [ -n "$REGRESSIONS" ]; then
            exit 1
          fi

      - name: Close PR on score failure
        if: failure() && (steps.score-check.outputs.regressions != '' || steps.score-check.outputs.low_quality != '')
        uses: actions/github-script@v7
        with:
          script: |
            const regressions = `${{ steps.score-check.outputs.regressions }}`;
            const lowQuality = `${{ steps.score-check.outputs.low_quality }}`;
            let body = `## PR Auto-Closed: Score Check Failed\n\n`;

            if (lowQuality.trim()) {
              body += `### Below Low Quality Threshold\n\nThis PR scored below the minimum acceptable quality floor.\n\n| File | Threshold | PR Score |\n|------|-----------|----------|\n${lowQuality}\n`;
            }

            if (regressions.trim()) {
              body += `### Score Regression\n\nThis PR would lower the score compared to \`main\`.\n\n| File | Main Score | PR Score |\n|------|-----------|----------|\n${regressions}\n`;
            }

            body += `Please retune and submit a new PR with a higher score.`;

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                state: 'closed'
              });
            } catch (err) {
              console.error(`Failed to comment/close PR on score failure: ${err.message}`);
            }

      - name: Run tests
        id: test-check
        run: python -m pytest tests/ -v 2>&1 | tee /tmp/test-output.txt

      - name: Comment test failures on PR
        if: failure() && steps.test-check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/test-output.txt', 'utf8');
            const lines = output.split('\n');
            const failures = lines.filter(l => l.match(/^(FAILED|ERROR|tests\/.*FAILED)/));
            const summary = lines.slice(-3).join('\n');
            const body = `## Tests Failed\n\n\`\`\`\n${failures.join('\n')}\n\n${summary}\n\`\`\`\n\nPlease fix the failing tests and push again.`;
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } catch (err) {
              console.error(`Failed to post test-failure comment: ${err.message}`);
            }

      - name: Run secret scan
        id: secret-check
        run: python scripts/check_secrets.py nerves/ adapters/ connectors/ mcp_tools/ mcps/ 2>&1 | tee /tmp/secrets-output.txt

      - name: Comment secret scan errors on PR
        if: failure() && steps.secret-check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/secrets-output.txt', 'utf8');
            const body = `## Secret Scan Failed\n\nPotential secrets or sensitive data detected:\n\n\`\`\`\n${output}\n\`\`\`\n\nPlease remove any secrets and push again.`;
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } catch (err) {
              console.error(`Failed to post secret-scan comment: ${err.message}`);
            }

      - name: Auto-approve PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'APPROVE',
                body: 'All checks passed. Auto-approved by CI.'
              });
            } catch (err) {
              console.error(`Failed to auto-approve PR: ${err.message}`);
            }

      - name: Auto-merge PR
        if: success()
        run: gh pr merge ${{ github.event.pull_request.number }} --rebase --auto --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
