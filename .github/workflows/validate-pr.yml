name: Validate PR

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Reject changes to auto-managed files
        id: path-check
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          ERRORS=0
          REASONS=""

          if echo "$CHANGED" | grep -q '^manifest\.json$'; then
            MSG="manifest.json is auto-generated by CI. Remove it from your PR."
            echo "::error::$MSG"
            REASONS="${REASONS}- ${MSG}\n"
            ERRORS=1
          fi

          # adapters/{role}/{size_class}/ defaults are core-managed
          # adapters/{role}/{size_class}/{model_name}/ are community-contributed
          DEFAULT_ADAPTER_FILES=$(echo "$CHANGED" | grep '^adapters/' | grep -v '^adapters/[^/]*/[^/]*/[^/]*/' || true)
          if [ -n "$DEFAULT_ADAPTER_FILES" ]; then
            MSG="Default adapter files are managed by the core team. Community PRs can only add model-specific adapters under adapters/{role}/{size_class}/{model_name}/."
            echo "::error::$MSG"
            echo "  Protected files: $DEFAULT_ADAPTER_FILES"
            REASONS="${REASONS}- ${MSG}\n"
            ERRORS=1
          fi

          if echo "$CHANGED" | grep -q '^scripts/'; then
            MSG="scripts/ contains internal tooling. Community PRs cannot modify scripts."
            echo "::error::$MSG"
            REASONS="${REASONS}- ${MSG}\n"
            ERRORS=1
          fi

          if echo "$CHANGED" | grep -q '^schemas/'; then
            MSG="schemas/ are maintained by the core team. Community PRs cannot modify schemas."
            echo "::error::$MSG"
            REASONS="${REASONS}- ${MSG}\n"
            ERRORS=1
          fi

          if echo "$CHANGED" | grep -q '^\.github/'; then
            MSG="CI workflows are maintained by the core team. Community PRs cannot modify .github/."
            echo "::error::$MSG"
            REASONS="${REASONS}- ${MSG}\n"
            ERRORS=1
          fi

          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "reasons<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REASONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$ERRORS" -ne 0 ]; then
            echo ""
            echo "Community PRs can modify: nerves/, adapters/{role}/{size}/{model}/, connectors/, tools/, mcps/"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

      - name: Comment failure reason on PR
        if: failure() && steps.path-check.outputs.errors != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const reasons = `${{ steps.path-check.outputs.reasons }}`;
            const body = `## Validation Failed\n\nThis PR modifies protected paths:\n\n${reasons}\nCommunity PRs can modify: \`nerves/\`, \`adapters/{role}/{size}/{model}/\`, \`connectors/\`, \`tools/\`, \`mcps/\`. Default adapter files are core-managed. See [CONTRIBUTING.md](CONTRIBUTING.md) for details.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Run schema validation
        id: schema-check
        run: python scripts/validate.py 2>&1 | tee /tmp/validate-output.txt

      - name: Comment schema errors on PR
        if: failure() && steps.schema-check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/validate-output.txt', 'utf8');
            const errors = output.split('\n').filter(l => l.match(/^\s+(ERROR|UNSAFE|.*missing|.*invalid|.*must|.*lora_target)/i));
            const body = `## Schema Validation Failed\n\n\`\`\`\n${errors.join('\n')}\n\`\`\`\n\nPlease fix the issues above and push again. See [CONTRIBUTING.md](CONTRIBUTING.md) for details.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Check for score regression
        id: score-check
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          REGRESSIONS=""

          for ctx in $(echo "$CHANGED" | grep 'context\.json$'); do
            # Only check adapter context files
            echo "$ctx" | grep -q '^adapters/' || continue

            # Check if file exists on main
            if git show origin/main:"$ctx" > /dev/null 2>&1; then
              MAIN_SCORE=$(git show origin/main:"$ctx" | python3 -c "import sys,json; print(json.load(sys.stdin).get('qualification_score', 0))" 2>/dev/null || echo "0")
              PR_SCORE=$(python3 -c "import sys,json; print(json.load(open('$ctx')).get('qualification_score', 0))" 2>/dev/null || echo "0")

              if python3 -c "exit(0 if float('$PR_SCORE') < float('$MAIN_SCORE') else 1)"; then
                echo "::error::$ctx: score regression $PR_SCORE < $MAIN_SCORE (main)"
                REGRESSIONS="${REGRESSIONS}| \`$ctx\` | $MAIN_SCORE | $PR_SCORE |\n"
              else
                echo "  $ctx: OK ($PR_SCORE >= $MAIN_SCORE)"
              fi
            else
              echo "  $ctx: new file, no baseline"
            fi
          done

          echo "regressions<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REGRESSIONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ -n "$REGRESSIONS" ]; then
            exit 1
          fi

      - name: Close PR on score regression
        if: failure() && steps.score-check.outputs.regressions != ''
        uses: actions/github-script@v7
        with:
          script: |
            const regressions = `${{ steps.score-check.outputs.regressions }}`;
            const body = `## PR Auto-Closed: Score Regression\n\nThis PR was automatically closed because it would lower the qualification score compared to what is currently on \`main\`.\n\n| File | Main Score | PR Score |\n|------|-----------|----------|\n${regressions}\nOnly PRs that maintain or improve scores are accepted. Please retune and submit a new PR with a higher score.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });

      - name: Run secret scan
        id: secret-check
        run: python scripts/check_secrets.py nerves/ adapters/ connectors/ tools/ mcps/ 2>&1 | tee /tmp/secrets-output.txt

      - name: Comment secret scan errors on PR
        if: failure() && steps.secret-check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/secrets-output.txt', 'utf8');
            const body = `## Secret Scan Failed\n\nPotential secrets or sensitive data detected:\n\n\`\`\`\n${output}\n\`\`\`\n\nPlease remove any secrets and push again.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
