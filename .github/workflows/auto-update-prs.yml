name: Auto-update PR branches

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update open PR branches
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main'
            });

            for (const pr of prs) {
              console.log(`Processing PR #${pr.number}: ${pr.title}`);
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                });
                console.log(`  Updated PR #${pr.number}`);
              } catch (err) {
                if (err.message?.includes('conflict')) {
                  console.log(`  PR #${pr.number} has conflicts — attempting merge resolution`);
                  // Post a comment so the contributor knows
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    body: `## Merge Conflict\n\nThis PR has conflicts with \`main\` that could not be auto-resolved. Please rebase or merge main into your branch to fix.\n\n\`\`\`bash\ngit fetch origin main\ngit merge origin/main\n# resolve conflicts\ngit push\n\`\`\``
                  });
                } else {
                  console.log(`  Failed to update PR #${pr.number}: ${err.message}`);
                }
              }
            }
